  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background: #f0f8ff;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .menu-info {
      font-size: 0.9rem;
      color: #444;
      margin-bottom: 20px;
    }

    .menu {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 30px;
    }

    .category-btn {
      background-color: #02768f;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      min-width: 70px;
    }

    .category-btn.active {
      background-color: #c21111;
      color: white;
    }

    .category-btn.nav-arrow {
      background-color: #0b38a4;
      color: white;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 4px;
      width: 40px;
      height: 40px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
      transition: background-color 0.3s;
      border: none;
    }

    .category-btn.nav-arrow:hover {
      background-color: #002a99;
    }

    #word {
      font-size: 3rem;
      font-weight: bold;
      color: #333;
      margin: 30px 0 10px;
      min-height: 60px;
      cursor: pointer;
    }

    #meaning {
      font-size: 1.2rem;
      color: #666;
      margin-bottom: 30px;
      min-height: 1.5em;
    }

    .controls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0;
    }

    button {
      cursor: pointer;
    }

    #randomBtn {
      background-color: #087445;
      color: white;
      font-size: 1.1rem;
      padding: 10px 30px;
      border: none;
      border-radius: 8px;
    }

    #intervalInput {
      padding: 10px;
      width: 100px;
      text-align: center;
      font-size: 1rem;
      border: 2px solid #0040ff;
      border-radius: 6px;
    }

    #applyBtn, #toggleLangBtn, #togglePickBtn, #toggleShowBtn, #toggleAutoShowBtn {
  width: 120px;            
  height: 40px;           
  padding: 0 10px;
  background-color: black;
  color: white;
  border: none;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  text-align: center;
  white-space: nowrap;
}

#applyBtn span,
#toggleLangBtn span,
#togglePickBtn span,
#toggleShowBtn span,
#toggleAutoShowBtn span {
  display: block;
  font-size: 1rem;
  max-width: 100%;
  text-overflow: ellipsis;
  overflow: hidden;
  text-align: center;
  font-size: clamp(0.6rem, 2vw, 1rem); 
}

    #applyBtn {
      background-color: #c21111;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 90%;
      max-width: 700px;
    }

    table, th, td {
      border: 1px solid #999;
    }

    th, td {
      padding: 10px;
      text-align: center;
    }

    #searchInput {
      margin: 10px auto;
      padding: 10px;
      width: 90%;
      max-width: 400px;
      font-size: 1rem;
      border: 2px solid #0040ff;
      border-radius: 6px;
      display: none;
    }

    footer {
      margin-top: 40px;
      font-size: 0.9rem;
      color: #000000;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      #word {
        font-size: 2rem;
      }

      .controls {
        flex-direction: column;
        align-items: center;
      }

      table, th, td {
        font-size: 0.9rem;
      }

      #searchInput {
        width: 95%;
      }
    }
	  #quizContainer {
    background: #f9fafe;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0, 64, 255, 0.1);
    padding: 25px;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    font-size: 1rem;
    color: #222;
    animation: fadeIn 0.3s ease-in;
  }

  #quizContainer h3 {
    text-align: center;
    color: #0b38a4;
    margin-bottom: 20px;
    font-size: 1.6rem;
  }

  #quizContainer ol {
    padding-left: 20px;
  }

  #quizContainer li {
    margin-bottom: 15px;
    line-height: 1.6;
    background: #f0f4ff;
    padding: 10px;
    border-radius: 8px;
  }

  .quiz-option {
    background: #ffffff;
    border: 2px solid #ccc;
    border-radius: 8px;
    padding: 10px 14px;
    margin: 6px 0;
    transition: 0.2s ease;
    cursor: pointer;
    display: flex;
    align-items: center;
  }

  .quiz-option:hover {
    background: #e6f0ff;
    border-color: #0b38a4;
  }

  .quiz-option input[type="radio"] {
    margin-right: 10px;
  }

  #quizContainer button {
    background-color: #0b38a4;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 1rem;
    margin: 12px 6px 0 0;
    cursor: pointer;
    transition: 0.3s;
  }

  #quizContainer button:hover {
    background-color: #002a99;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .hide-btn {
  background-color: #e8f0fe;
  border: 1px solid #90caf9;
  color: #0b38a4;
  padding: 6px 12px;
  margin: 4px;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}

.hide-btn:hover {
  background-color: #d2e3fc;
}

.mini-show-btn {
  font-size: 12px;
  padding: 3px 6px;
  border-radius: 4px;
  background: #e8f0fe;
  border: 1px solid #90caf9;
  cursor: pointer;
}
.mini-show-btn:hover {
  background: #d2e3fc;
}

#resizeHandle {
  height: 18px;
  background: transparent;
  cursor: ns-resize;
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 99999;
  touch-action: none;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
}

#resizeHandle::before {
  content: "";
  width: 60px;
  height: 4px;
  background-color: #999;
  border-radius: 2px;
}

  </style>

(function enableResizableDrawingPad() {
  const handle = document.getElementById("resizeHandle");
  const container = document.getElementById("drawingContainer");
  const canvas = document.getElementById("drawingCanvas");

  let isResizing = false;
  let startY = 0;
  let startHeight = 0;

  function startResize(y) {
    isResizing = true;
    startY = y;
    startHeight = container.offsetHeight;
  }

function doResize(y) {
  if (!isResizing) return;

  const delta = startY - y;
  const newHeight = startHeight + delta;

  if (newHeight > 100 && newHeight < window.innerHeight * 0.9) {
    const canvas = document.getElementById("drawingCanvas");
    const ctx = canvas.getContext("2d");

    const backupCanvas = document.createElement("canvas");
    backupCanvas.width = canvas.width;
    backupCanvas.height = canvas.height;
    const backupCtx = backupCanvas.getContext("2d");
    backupCtx.drawImage(canvas, 0, 0);

    container.style.height = newHeight + "px";
    canvas.height = newHeight;
    canvas.width = backupCanvas.width;

    const ctxNew = canvas.getContext("2d");
    ctxNew.drawImage(backupCanvas, 0, 0);
  }
}

  function stopResize() {
    isResizing = false;
  }

  handle.addEventListener("mousedown", (e) => {
    startResize(e.clientY);
  });
  window.addEventListener("mousemove", (e) => doResize(e.clientY));
  window.addEventListener("mouseup", stopResize);

  handle.addEventListener("touchstart", (e) => {
    startResize(e.touches[0].clientY);
  });
  window.addEventListener("touchmove", (e) => {
    doResize(e.touches[0].clientY);
  });
  window.addEventListener("touchend", stopResize);
})();


function initDrawingCanvas() {
  const canvas = document.getElementById("drawingCanvas");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  let isDrawing = false;

  function getTouchPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    return {
      x: t.clientX - rect.left,
      y: t.clientY - rect.top
    };
  }

  canvas.addEventListener("touchstart", function (e) {
    e.preventDefault();
    const pos = getTouchPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    isDrawing = true;
  });

  canvas.addEventListener("touchmove", function (e) {
    if (!isDrawing) return;
    const pos = getTouchPos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  });

  canvas.addEventListener("touchend", function () {
    isDrawing = false;
  });
}

  const input = document.getElementById("searchInput").value.toLowerCase();
  const list = selectedCategories.flatMap(cat => vocabulary[cat] || []);

 if (forceNewFilter) {
  filteredList = list.filter(entry => {
    const text = (entry.word + " " + entry.meaning).toLowerCase();
    return text.includes(input);
  });
  originalFilteredList = [...filteredList];
  currentTablePage = 1;
}

  window.renderTable(currentTablePage);
}

function sortEntries() {
  if (!sortBy) return;
  filteredList.sort((a, b) => {
    const aVal = sortBy === "jp" ? (reverse ? a.meaning : a.word) : (reverse ? a.word : a.meaning);
    const bVal = sortBy === "jp" ? (reverse ? b.meaning : b.word) : (reverse ? b.word : b.meaning);
    return sortAsc ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
  });
}

function renderTable(page = 1) {
  const container = document.getElementById("tableContainer");
  const chunkSize = 20;
  const totalPages = Math.ceil(filteredList.length / chunkSize);
  currentTablePage = page;

  sortEntries();
  const start = (page - 1) * chunkSize;
  const chunk = filteredList.slice(start, start + chunkSize);
  
  if (filteredList.length === 0) {
    container.innerHTML = `<p style="margin-top:10px;">No results found.</p>`;
    return;
  }

  let html = "";

  if (totalPages > 1) {
    html += `<div style="margin-bottom:12px; text-align:center;">`;
    if (page > 1) {
      html += `<button onclick="renderTable(${page - 1})" 
        style="margin: 2px; padding: 6px 12px; border:1px solid #0b38a4; background:#fff; color:#0b38a4; cursor:pointer;">
        ⬅ Prev
      </button>`;
    }
    html += `<span style="margin:0 12px; font-weight:bold; color:#333;">Page ${page} of ${totalPages}</span>`;
    if (page < totalPages) {
      html += `<button onclick="renderTable(${page + 1})" 
        style="margin: 2px; padding: 6px 12px; border:1px solid #0b38a4; background:#fff; color:#0b38a4; cursor:pointer;">
        Next ➡
      </button>`;
    }
    html += `</div>`;
  }

  html += `<table id="dataTable" style="width:100%; border-collapse:collapse; text-align:left; border:1px solid #ccc;">
    <thead style="background:#02768f; color:white;">
      <tr>
        <th style="padding:8px; width:50px; border:1px solid #ccc;">No</th>`;

  const jpArrow = sortBy === "jp" ? (sortAsc ? "↑" : "↓") : "↕";
  const idArrow = sortBy === "id" ? (sortAsc ? "↑" : "↓") : "↕";

  html += `<th onclick="toggleSort('jp')" style="cursor:pointer; padding:8px; border:1px solid #ccc;">${reverse ? "Indonesia" : "Jepang"} ${jpArrow}</th>`;
  html += `<th onclick="toggleSort('id')" style="cursor:pointer; padding:8px; border:1px solid #ccc;">${reverse ? "Jepang" : "Indonesia"} ${idArrow}</th>`;
  html += `</tr></thead><tbody>`;

  chunk.forEach((entry, index) => {
    html += `<tr style="border-bottom:1px solid #ddd;"><td style="padding:6px; border:1px solid #ccc;">${start + index + 1}</td>`;

    const jpText = reverse ? entry.meaning : entry.word;
    const idText = reverse ? entry.word : entry.meaning;

    const uniqueKey = `${entry.word}_${entry.meaning}_${start + index}`;
    const jpKey = uniqueKey + "_jp";
    const idKey = uniqueKey + "_id";

    if (hideJPText) {
      if (showIndividualJP.has(jpKey)) {
        html += `<td style="padding:6px; border:1px solid #ccc;"><span id="${jpKey}">${jpText} 
          <button onclick="hideJP('${jpKey}', \`${jpText.replace(/`/g, '\\`')}\`)" 
          style="margin-left:6px; padding:4px 8px; border:1px solid #d9534f; background:#f8d7da; color:#d9534f; cursor:pointer;">Hide</button></span></td>`;
      } else {
        html += `<td style="padding:6px; border:1px solid #ccc;"><span id="${jpKey}">
          <button onclick="showJP('${jpKey}', \`${jpText.replace(/`/g, '\\`')}\`)" 
          style="padding:4px 8px; border:1px solid #0b38a4; background:#fff; color:#0b38a4; cursor:pointer;">Show</button></span></td>`;
      }
    } else {
      html += `<td style="padding:6px; border:1px solid #ccc;">${jpText}</td>`;
    }

    if (hideIDText) {
      if (showIndividualID.has(idKey)) {
        html += `<td style="padding:6px; border:1px solid #ccc;"><span id="${idKey}">${idText} 
          <button onclick="hideID('${idKey}', \`${idText.replace(/`/g, '\\`')}\`)" 
          style="margin-left:6px; padding:4px 8px; border:1px solid #d9534f; background:#f8d7da; color:#d9534f; cursor:pointer;">Hide</button></span></td>`;
      } else {
        html += `<td style="padding:6px; border:1px solid #ccc;"><span id="${idKey}">
          <button onclick="showID('${idKey}', \`${idText.replace(/`/g, '\\`')}\`)" 
          style="padding:4px 8px; border:1px solid #0b38a4; background:#fff; color:#0b38a4; cursor:pointer;">Show</button></span></td>`;
      }
    } else {
      html += `<td style="padding:6px; border:1px solid #ccc;">${idText}</td>`;
    }

    html += `</tr>`;
  });

  html += `</tbody></table>`;

  const input = document.getElementById("searchInput").value.toLowerCase();
  if (!input && totalPages > 1) {
    html += `<div style="margin-top: 12px; text-align:center;">`;
    for (let i = 1; i <= totalPages; i++) {
      html += `<button onclick="renderTable(${i})" 
        style="margin: 2px; padding: 6px 12px; border:1px solid #0b38a4; 
        ${i === page ? 'background:#02768f;color:white;' : 'background:#fff;color:#0b38a4;'} cursor:pointer;">
        ${i}
      </button>`;
    }
    html += `</div>`;
  }

  container.innerHTML = html;
}

window.renderTable = renderTable;

function toggleSort(column) {
  if (sortBy === column) {
    if (sortAsc === false) {
      sortBy = null;
      filteredList = [...originalFilteredList];
      currentTablePage = 1;
      showAllWords(false);
      return;
    }
    sortAsc = !sortAsc;
  } else {
    sortBy = column;
    sortAsc = true;
  }

  currentTablePage = 1;
  showAllWords(false);
}

function toggleShowTable() {
  tableShown = !tableShown;
  document.getElementById("toggleShowBtn").innerText = `Vocabulary: ${tableShown ? "ON" : "OFF"}`;
  const searchInput = document.getElementById("searchInput");
  const hideControls = document.getElementById("hideControls");

  if (tableShown) {
    showAllWords();
    searchInput.style.display = "inline-block"; 
    if (hideControls) hideControls.style.display = "block"; 
  } else {
    document.getElementById("tableContainer").innerHTML = "";
    searchInput.value = "";
	searchInput.style.display = "none"; 
    if (hideControls) hideControls.style.display = "none"; 
  }
}

    function filterTable() {
  showAllWords(true);
}

    createMenu();
    randomWord();
    setIntervalTime();
  </script>
</body>
</html>
