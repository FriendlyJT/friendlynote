    body {

      text-align: center;
      margin: 0;
      padding: 20px;
      background: #f0f8ff;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .menu-info {
      font-size: 0.9rem;
      color: #444;
      margin-bottom: 20px;
    }

    .menu {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 30px;
    }

    .category-btn {
      background-color: #02768f;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      min-width: 70px;
    }

    .category-btn.active {
      background-color: #c21111;
      color: white;
    }

    .category-btn.nav-arrow {
      background-color: #0b38a4;
      color: white;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 4px;
      width: 40px;
      height: 40px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
      transition: background-color 0.3s;
      border: none;
    }

    .category-btn.nav-arrow:hover {
      background-color: #002a99;
    }

    #word {
      font-size: 3rem;
      font-weight: bold;
      color: #333;
      margin: 30px 0 10px;
      min-height: 60px;
      cursor: pointer;
    }

    #meaning {
      font-size: 1.2rem;
      color: #666;
      margin-bottom: 30px;
      min-height: 1.5em;
    }

    .controls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0;
    }

    button {
      cursor: pointer;
    }

    #randomBtn {
      background-color: #087445;
      color: white;
      font-size: 1.1rem;
      padding: 10px 30px;
      border: none;
      border-radius: 8px;
    }

    #intervalInput {
      padding: 10px;
      width: 100px;
      text-align: center;
      font-size: 1rem;
      border: 2px solid #0040ff;
      border-radius: 6px;
    }

    #applyBtn, #toggleLangBtn, #togglePickBtn, #toggleShowBtn, #toggleAutoShowBtn {
  width: 120px;            
  height: 40px;           
  padding: 0 10px;
  background-color: black;
  color: white;
  border: none;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  text-align: center;
  white-space: nowrap;
}

#applyBtn span,
#toggleLangBtn span,
#togglePickBtn span,
#toggleShowBtn span,
#toggleAutoShowBtn span {
  display: block;
  font-size: 1rem;
  max-width: 100%;
  text-overflow: ellipsis;
  overflow: hidden;
  text-align: center;
  font-size: clamp(0.6rem, 2vw, 1rem); 
}

    #applyBtn {
      background-color: #c21111;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 90%;
      max-width: 700px;
    }

    table, th, td {
      border: 1px solid #999;
    }

    th, td {
      padding: 10px;
      text-align: center;
    }

    #searchInput {
      margin: 10px auto;
      padding: 10px;
      width: 90%;
      max-width: 400px;
      font-size: 1rem;
      border: 2px solid #0040ff;
      border-radius: 6px;
      display: none;
    }

    footer {
      margin-top: 40px;
      font-size: 0.9rem;
      color: #000000;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      #word {
        font-size: 2rem;
      }

      .controls {
        flex-direction: column;
        align-items: center;
      }

      table, th, td {
        font-size: 0.9rem;
      }

      #searchInput {
        width: 95%;

	  #quizContainer {
    background: #f9fafe;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0, 64, 255, 0.1);
    padding: 25px;

    font-size: 1rem;
    color: #222;
    animation: fadeIn 0.3s ease-in;

    text-align: center;
    color: #0b38a4;
    margin-bottom: 20px;
    font-size: 1.6rem;
  }

  #quizContainer ol {
    padding-left: 20px;
  }

  #quizContainer li {
    margin-bottom: 15px;
    line-height: 1.6;
    background: #f0f4ff;
    padding: 10px;
    border-radius: 8px;
  }

  .quiz-option {
    background: #ffffff;
    border: 2px solid #ccc;
    border-radius: 8px;
    padding: 10px 14px;
    margin: 6px 0;
    transition: 0.2s ease;
    cursor: pointer;
    display: flex;
    align-items: center;
  }

  .quiz-option:hover {
    background: #e6f0ff;
    border-color: #0b38a4;
  }

  .quiz-option input[type="radio"] {
    margin-right: 10px;
  }

  #quizContainer button {
    background-color: #0b38a4;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 1rem;
    margin: 12px 6px 0 0;
    cursor: pointer;
    transition: 0.3s;
  }

  #quizContainer button:hover {
    background-color: #002a99;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .hide-btn {
  background-color: #e8f0fe;
  border: 1px solid #90caf9;
  color: #0b38a4;
  padding: 6px 12px;
  margin: 4px;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}

.hide-btn:hover {
  background-color: #d2e3fc;
}

.mini-show-btn {
  font-size: 12px;
  padding: 3px 6px;
  border-radius: 4px;
  background: #e8f0fe;
  border: 1px solid #90caf9;
  cursor: pointer;
}
.mini-show-btn:hover {
  background: #d2e3fc;
}

#resizeHandle {
  height: 18px;
  background: transparent;
  cursor: ns-resize;
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 99999;
  touch-action: none;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
}

#resizeHandle::before {
  content: "";
  width: 60px;
  height: 4px;
  background-color: #999;
  border-radius: 2px;
}

function startEssay() {
  const selectedWords = shuffleArray(
    selectedCategories.includes("All")
      ? Object.values(essayVocabulary).flat()
      : selectedCategories.flatMap(cat => essayVocabulary[cat] || [])
  );

  const essayLengthInput = document.querySelector('input[name="essayLength"]:checked');
  const totalQuestions = essayLengthInput ? parseInt(essayLengthInput.value) : 20;

  essayQuestions = selectedWords.slice(0, totalQuestions);
  essayAnswers = [];
  currentEssayIndex = 0;

  document.getElementById("quizContainer").style.display = "block";
  document.getElementById("essayLengthOptions").style.display = "block";

  showEssayQuestion();
}

document.querySelectorAll('input[name="essayLength"]').forEach(radio => {
  radio.addEventListener('change', () => {
    if (essayMode) startEssay();
  });
});

function showEssayQuestion() {
  const container = document.getElementById("quizContainer");
  if (currentEssayIndex >= essayQuestions.length) return showEssayResult();

  const q = essayQuestions[currentEssayIndex];
  const questionText = `Tuliskan Hiragana dari Kanji "<strong>${q.kanji}</strong>"? `;

  let html = `<div style="margin-bottom:10px; font-weight:bold; color:#0b38a4">Soal ${currentEssayIndex + 1} dari ${essayQuestions.length}</div>`;
  html += `<div style="margin-bottom:10px; width:100%; box-sizing:border-box;">${questionText}</div>`;
  html += `<input type="text" id="essayAnswerInput" style="width:100%; padding:8px; font-size:1rem; margin-bottom:10px; box-sizing:border-box; border:1px solid #ccc; border-radius:5px;" />`;
  html += `<div id="essayWarning" style="color:red; margin-top:10px;"></div>`;
  html += `<button id="essayAnswerBtn" onclick="submitEssayAnswer()">Answer</button>`;
  container.innerHTML = html;

  const input = document.getElementById("essayAnswerInput");

  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      const warningEl = document.getElementById("essayWarning");

      if (input.value.trim() !== "") {
        warningEl.textContent = "";
        document.getElementById("essayAnswerBtn").click();
      } else {
        warningEl.textContent = "Answer cannot be blank!";
        input.focus();
      }
    }
  });
}

function submitEssayAnswer() {
  const input = document.getElementById("essayAnswerInput");
  let answer = input.value.trim().toLowerCase();

  answer = answer.replace(/[,\.;\/\s\(\)\[\]]/g, '');

  if (!answer) {
    const warningDiv = document.getElementById("essayWarning");
    if (warningDiv) warningDiv.textContent = "Answer cannot be blank!";
    return;
  } else {
    const warningDiv = document.getElementById("essayWarning");
    if (warningDiv) warningDiv.textContent = "";
  }

  const q = essayQuestions[currentEssayIndex];
  const possibleAnswers = [q.romaji].filter(Boolean);

  essayAnswers.push({
    question: q.kanji,
    correct: q.romaji,
    answer,
    isCorrect: possibleAnswers.includes(answer)
  });

  currentEssayIndex++;
  showEssayQuestion();

  const nextInput = document.getElementById("essayAnswerInput");
  if (nextInput) nextInput.focus();
}

function showEssayResult(page = 1) {
  currentEssayResultPage = page;
  const start = (page - 1) * resultsPerPage;
  const end = start + resultsPerPage;
  const visibleAnswers = essayAnswers.slice(start, end);

  let score = essayAnswers.filter(q => q.isCorrect).length;

  let html = `<h3>Essay Results :</h3><ol start="${start + 1}">`;
  visibleAnswers.forEach((q, i) => {
    html += `<li style="margin-bottom:8px;">${q.question}<br />
      Jawaban kamu: <strong>${q.answer}</strong> ${q.isCorrect ? "✅" : "❌"}<br />
      Jawaban benar: <strong>${q.correct}</strong>
    </li>`;
  });
  html += `</ol><h4>Jawaban Benar: ${score} dari ${essayAnswers.length}</h4>`;
  const nilai = Math.round((score / essayAnswers.length) * 100);
  let warna = nilai >= 80 ? "green" : nilai >= 60 ? "orange" : "red";
  html += `<div><strong>Nilai:</strong> <span style="color:${warna}"> ${nilai}</span></div>`;

  const totalPages = Math.ceil(essayAnswers.length / resultsPerPage);
  if (totalPages > 1) {
    html += `<div style="margin:10px 0;">`;
    if (page > 1) {
      html += `<button onclick="showEssayResult(${page - 1})" style="margin:2px; padding:4px 8px; font-size:0.85rem;">Prev</button> `;
    }

    for (let p = 1; p <= totalPages; p++) {
      const isActive = p === page;
      html += `<button onclick="showEssayResult(${p})" style="
        margin:2px;
        padding:4px 8px;
        font-size:0.85rem;
        border-radius:5px;
        ${isActive ? 'background-color:#d40000; color:white; font-weight:bold;' : ''}
      ">${p}</button>`;
    }

    if (page < totalPages) {
      html += `<button onclick="showEssayResult(${page + 1})" style="margin:2px; padding:4px 8px; font-size:0.85rem;">Next</button>`;
    }
    html += `</div>`;
  }

  html += `<button onclick="startEssay()">Try again</button> `;
  html += `<button onclick="document.getElementById('essayModeToggle').click()">Exit</button>`;

  document.getElementById("quizContainer").innerHTML = html;
}

function shuffleTable() {
  const table = document.getElementById("dataTable");
  if (!table) return;

  const tbody = table.querySelector("tbody");
  const rows = Array.from(tbody.querySelectorAll("tr"));
  const shuffled = shuffleArray(rows);

  tbody.innerHTML = "";
  shuffled.forEach((row, index) => {
    row.querySelector("td").innerText = index + 1;
    tbody.appendChild(row);
  });
}

    hideIDText = !hideIDText;

    if (hideIDText) hideJPText = false;

    document.getElementById('toggleID').innerText = hideIDText ? "Unhide ID" : "Hide ID";

  if (drawDiv.style.display === "none") {

    toggleBtn.innerText = "Hide";

    if (savedDrawing) {
      const img = new Image();
      img.onload = function () {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
      };
      img.src = savedDrawing;
    }

    initDrawingCanvas(); 
  } else {
    savedDrawing = canvas.toDataURL();
    drawDiv.style.display = "none";
    toggleBtn.innerText = "✏️ Draw";
  }
}

(function enableResizableDrawingPad() {
  const handle = document.getElementById("resizeHandle");
  const container = document.getElementById("drawingContainer");
  const canvas = document.getElementById("drawingCanvas");

  let isResizing = false;
  let startY = 0;
  let startHeight = 0;

  function startResize(y) {
    isResizing = true;
    startY = y;
    startHeight = container.offsetHeight;
  }

function doResize(y) {
  if (!isResizing) return;

  const delta = startY - y;
  const newHeight = startHeight + delta;

  if (newHeight > 100 && newHeight < window.innerHeight * 0.9) {
    const canvas = document.getElementById("drawingCanvas");
    const ctx = canvas.getContext("2d");

    const backupCanvas = document.createElement("canvas");
    backupCanvas.width = canvas.width;
    backupCanvas.height = canvas.height;
    const backupCtx = backupCanvas.getContext("2d");
    backupCtx.drawImage(canvas, 0, 0);

    container.style.height = newHeight + "px";
    canvas.height = newHeight;
    canvas.width = backupCanvas.width;

    const ctxNew = canvas.getContext("2d");
    ctxNew.drawImage(backupCanvas, 0, 0);
  }
}

  function stopResize() {
    isResizing = false;
  }

  handle.addEventListener("mousedown", (e) => {
    startResize(e.clientY);
  });
  window.addEventListener("mousemove", (e) => doResize(e.clientY));
  window.addEventListener("mouseup", stopResize);

  handle.addEventListener("touchstart", (e) => {
    startResize(e.touches[0].clientY);
  });
  window.addEventListener("touchmove", (e) => {
    doResize(e.touches[0].clientY);
  });
  window.addEventListener("touchend", stopResize);
})();


function initDrawingCanvas() {
  const canvas = document.getElementById("drawingCanvas");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  let isDrawing = false;

  function getTouchPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    return {
      x: t.clientX - rect.left,
      y: t.clientY - rect.top
    };
  }

  canvas.addEventListener("touchstart", function (e) {
    e.preventDefault();
    const pos = getTouchPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    isDrawing = true;
  });

  canvas.addEventListener("touchmove", function (e) {
    if (!isDrawing) return;
    const pos = getTouchPos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  });

  canvas.addEventListener("touchend", function () {
    isDrawing = false;
  });
}



function clearCanvas() {
  const canvas = document.getElementById("drawingCanvas");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function startQuiz() {
  const selectedWords = shuffleArray(selectedCategories.flatMap(cat => vocabulary[cat] || []));
  const quizLengthInput = document.querySelector('input[name="quizLength"]:checked');
  const totalQuestions = quizLengthInput ? parseInt(quizLengthInput.value) : 20;

  const half = Math.floor(totalQuestions / 2);
  const questionsIDtoJP = selectedWords.slice(0, half).map(q => ({ ...q, reverse: true })); 
  const questionsJPtoID = selectedWords.slice(half, half * 2).map(q => ({ ...q, reverse: false }));

  quizQuestions = shuffleArray([...questionsIDtoJP, ...questionsJPtoID]);
  quizAnswers = [];
  currentQuizIndex = 0;

  document.getElementById("quizContainer").style.display = "block";
  showQuizQuestion();
}

function showQuizQuestion() {
  const container = document.getElementById("quizContainer");
  if (currentQuizIndex >= quizQuestions.length) return showQuizResult();

  const q = quizQuestions[currentQuizIndex];
  const correct = q.reverse ? q.word : q.meaning;
  const questionText = `Apa kanji dari "<strong>${q.reverse ? q.meaning : q.word}</strong>" dalam bahasa ${q.reverse ? "Jepang" : "Indonesia"}?`;

  const sameCategoryWords = selectedCategories.flatMap(cat => vocabulary[cat] || []);
const correctAnswer = q.reverse ? q.word : q.meaning;

const allOptions = new Set();
allOptions.add(correctAnswer);

for (let item of shuffleArray(sameCategoryWords)) {
  const opt = q.reverse ? item.word : item.meaning;
  if (!allOptions.has(opt)) {
    allOptions.add(opt);
    if (allOptions.size >= 4) break;
  }
}

const options = shuffleArray([...allOptions]);

  let html = `<div style="margin-bottom:10px; font-weight:bold; color:#0b38a4">Soal ${currentQuizIndex + 1} dari ${quizQuestions.length}</div>`;
  html += `<div style="margin-bottom:10px;">${questionText}</div>`;
  options.forEach((opt, idx) => {
    html += `<label class="quiz-option"><input type="radio" name="quizOption" value="${opt}"/> ${String.fromCharCode(65 + idx)}. ${opt}</label>`;
  });
  html += `<div id="quizWarning" style="color:red; margin-top:10px;"></div>`;
  html += `<button onclick="submitQuizAnswer()">Answer</button>`;
  container.innerHTML = html;
}

function submitQuizAnswer() {
  const selected = document.querySelector("input[name='quizOption']:checked");
  if (!selected) {
  const warningDiv = document.getElementById("quizWarning");
  if (warningDiv) warningDiv.textContent = "Answers cannot be blank!";
  return;
} else {
  const warningDiv = document.getElementById("quizWarning");
  if (warningDiv) warningDiv.textContent = "";
}
  const answer = selected.value;
  const q = quizQuestions[currentQuizIndex];
  const correct = q.reverse ? q.word : q.meaning;
  quizAnswers.push({
    question: q.reverse ? q.meaning : q.word,
    correct,
    answer
  });
  currentQuizIndex++;
  showQuizQuestion();
}

  html += `</ol><h4>Jawaban Benar: ${score} dari ${quizAnswers.length}</h4>`;

  if (!sortBy) return;
  filteredList.sort((a, b) => {
    const aVal = sortBy === "jp" ? (reverse ? a.meaning : a.word) : (reverse ? a.word : a.meaning);
    const bVal = sortBy === "jp" ? (reverse ? b.meaning : b.word) : (reverse ? b.word : b.meaning);
    return sortAsc ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
  });
