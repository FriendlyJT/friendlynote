    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background: #f0f8ff;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .menu-info {
      font-size: 0.9rem;
      color: #444;
      margin-bottom: 20px;
    }

    .menu {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 30px;
    }

    .category-btn {
      background-color: #00e5ff;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      color: black;
      cursor: pointer;
      transition: 0.3s;
      min-width: 70px;
    }

    .category-btn.active {
      background-color: #de2923;
      color: white;
    }

    .category-btn.nav-arrow {
      background-color: #0040ff;
      color: white;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 4px;
      width: 40px;
      height: 40px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
      transition: background-color 0.3s;
      border: none;
    }

    .category-btn.nav-arrow:hover {
      background-color: #002a99;
    }

    #word {
      font-size: 3rem;
      font-weight: bold;
      color: #333;
      margin: 30px 0 10px;
      min-height: 60px;
      cursor: pointer;
    }

    #meaning {
      font-size: 1.2rem;
      color: #666;
      margin-bottom: 30px;
      min-height: 1.5em;
    }

    .controls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0;
    }

    button {
      cursor: pointer;
    }

    #randomBtn {
      background-color: #11a04c;
      color: white;
      font-size: 1.1rem;
      padding: 10px 30px;
      border: none;
      border-radius: 8px;
    }

    #intervalInput {
      padding: 10px;
      width: 100px;
      text-align: center;
      font-size: 1rem;
      border: 2px solid #0040ff;
      border-radius: 6px;
    }

    #applyBtn, #toggleLangBtn, #togglePickBtn, #toggleShowBtn, #toggleAutoShowBtn {
      padding: 10px 20px;
      font-size: 1rem;
      background-color: black;
      color: white;
      border: none;
      border-radius: 6px;
    }

    #applyBtn {
      background-color: #de2923;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 90%;
      max-width: 700px;
    }

    table, th, td {
      border: 1px solid #999;
    }

    th, td {
      padding: 10px;
      text-align: center;
    }

    #searchInput {
      margin: 10px auto;
      padding: 10px;
      width: 90%;
      max-width: 400px;
      font-size: 1rem;
      border: 2px solid #0040ff;
      border-radius: 6px;
      display: none;
    }

    footer {
      margin-top: 40px;
      font-size: 0.9rem;
      color: #000000;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      #word {
        font-size: 2rem;
      }

      .controls {
        flex-direction: column;
        align-items: center;
      }

      table, th, td {
        font-size: 0.9rem;
      }

      #searchInput {
        width: 95%;
      }
    }
	  #quizContainer {
    background: #f9fafe;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0, 64, 255, 0.1);
    padding: 25px;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    font-size: 1rem;
    color: #222;
    animation: fadeIn 0.3s ease-in;

    text-align: center;
    color: #0040ff;
    margin-bottom: 20px;
    font-size: 1.6rem;
  }

    padding-left: 20px;
  }

    margin-bottom: 15px;
    line-height: 1.6;
    background: #f0f4ff;
    padding: 10px;
    border-radius: 8px;
  }

  .quiz-option {
    background: #ffffff;
    border: 2px solid #ccc;
    border-radius: 8px;
    padding: 10px 14px;
    margin: 6px 0;
    transition: 0.2s ease;
    cursor: pointer;
    display: flex;
    align-items: center;
  }

  .quiz-option:hover {
    background: #e6f0ff;
    border-color: #0040ff;
  }

  .quiz-option input[type="radio"] {
    margin-right: 10px;
  }

  #quizContainer button {
    background-color: #0040ff;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 1rem;
    margin: 12px 6px 0 0;
    cursor: pointer;
    transition: 0.3s;
  }

  #quizContainer button:hover {
    background-color: #002a99;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .hide-btn {
  background-color: #e8f0fe;
  border: 1px solid #90caf9;
  color: #0040ff;
  padding: 6px 12px;

  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}

.hide-btn:hover {
  background-color: #d2e3fc;
}

.mini-show-btn {
  font-size: 12px;
  padding: 3px 6px;
  border-radius: 4px;
  background: #e8f0fe;
  border: 1px solid #90caf9;
  cursor: pointer;
}
.mini-show-btn:hover {
  background: #d2e3fc;
}

function initDrawingCanvas() {
  const canvas = document.getElementById("drawingCanvas");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  let isDrawing = false;

  function getTouchPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    return {
      x: t.clientX - rect.left,
      y: t.clientY - rect.top
    };
  }

  canvas.addEventListener("touchstart", function (e) {
    e.preventDefault();
    const pos = getTouchPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    isDrawing = true;
  });

  canvas.addEventListener("touchmove", function (e) {
    if (!isDrawing) return;
    const pos = getTouchPos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  });

  canvas.addEventListener("touchend", function () {
    isDrawing = false;
  });
}


function clearCanvas() {
  const canvas = document.getElementById("drawingCanvas");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function startQuiz() {
  const selectedWords = shuffleArray(selectedCategories.flatMap(cat => vocabulary[cat] || []));
  const quizLengthInput = document.querySelector('input[name="quizLength"]:checked');
  const totalQuestions = quizLengthInput ? parseInt(quizLengthInput.value) : 20;

  const half = Math.floor(totalQuestions / 2);
  const questionsIDtoJP = selectedWords.slice(0, half).map(q => ({ ...q, reverse: true })); 
  const questionsJPtoID = selectedWords.slice(half, half * 2).map(q => ({ ...q, reverse: false }));

  quizQuestions = shuffleArray([...questionsIDtoJP, ...questionsJPtoID]);
  quizAnswers = [];
  currentQuizIndex = 0;

  document.getElementById("quizContainer").style.display = "block";
  showQuizQuestion();
}

function showQuizQuestion() {
  const container = document.getElementById("quizContainer");
  if (currentQuizIndex >= quizQuestions.length) return showQuizResult();

  const q = quizQuestions[currentQuizIndex];
  const correct = q.reverse ? q.word : q.meaning;
  const questionText = `Apa kosakata dari "<strong>${q.reverse ? q.meaning : q.word}</strong>" dalam bahasa ${q.reverse ? "Jepang" : "Indonesia"}?`;

  const sameCategoryWords = selectedCategories.flatMap(cat => vocabulary[cat] || []);
const correctAnswer = q.reverse ? q.word : q.meaning;

const allOptions = new Set();
allOptions.add(correctAnswer);

for (let item of shuffleArray(sameCategoryWords)) {
  const opt = q.reverse ? item.word : item.meaning;
  if (!allOptions.has(opt)) {
    allOptions.add(opt);
    if (allOptions.size >= 4) break;
  }
}

const options = shuffleArray([...allOptions]);

  let html = `<div style="margin-bottom:10px; font-weight:bold; color:#0040ff">Soal ${currentQuizIndex + 1} dari ${quizQuestions.length}</div>`;
  html += `<div style="margin-bottom:10px;">${questionText}</div>`;
  options.forEach((opt, idx) => {
    html += `<label class="quiz-option"><input type="radio" name="quizOption" value="${opt}"/> ${String.fromCharCode(65 + idx)}. ${opt}</label>`;
  });
  html += `<div id="quizWarning" style="color:red; margin-top:10px;"></div>`;
  html += `<button onclick="submitQuizAnswer()">Jawab</button>`;
  container.innerHTML = html;
}

function submitQuizAnswer() {
  const selected = document.querySelector("input[name='quizOption']:checked");
  if (!selected) {
  const warningDiv = document.getElementById("quizWarning");
  if (warningDiv) warningDiv.textContent = "Jawaban tidak boleh kosong!";
  return;
} else {
  const warningDiv = document.getElementById("quizWarning");
  if (warningDiv) warningDiv.textContent = "";
}
  const answer = selected.value;
  const q = quizQuestions[currentQuizIndex];
  const correct = q.reverse ? q.word : q.meaning;
  quizAnswers.push({
    question: q.reverse ? q.meaning : q.word,
    correct,
    answer
  });
  currentQuizIndex++;
  showQuizQuestion();
}

function showQuizResult(page = 1) {
  currentResultPage = page;
  const start = (page - 1) * resultsPerPage;
  const end = start + resultsPerPage;
  const visibleAnswers = quizAnswers.slice(start, end);

  let score = quizAnswers.filter(q => q.answer === q.correct).length;

  let html = `<h3>Hasil Quiz</h3><ol start="${start + 1}">`;
  visibleAnswers.forEach((q, i) => {
    const isCorrect = q.answer === q.correct;
    html += `<li style="margin-bottom:8px;">${q.question}<br />
      Jawaban kamu: <strong>${q.answer}</strong> ${isCorrect ? "✅" : "❌"}<br />
      Jawaban benar: <strong>${q.correct}</strong>
    </li>`;
  });
  html += `</ol><h4>Jawaban Benar: ${score} dari ${quizAnswers.length}</h4>`;
const nilai = Math.round((score / quizAnswers.length) * 100);
let warna = nilai >= 80 ? "green" : nilai >= 60 ? "orange" : "red";
html += `<div><strong>Nilai:</strong> <span style="color:${warna}"> ${nilai}</span></div>`;

  const totalPages = Math.ceil(quizAnswers.length / resultsPerPage);
  if (totalPages > 1) {
    html += `<div style="margin:10px 0;">`;
    if (page > 1) {
      html += `<button onclick="showQuizResult(${page - 1})" style="margin:2px; padding:4px 8px; font-size:0.85rem;">Prev</button> `;

    }

     for (let p = 1; p <= totalPages; p++) {
      const isActive = p === page;
      html += `<button onclick="showQuizResult(${p})" style="
        margin:2px;
        padding:4px 8px;
        font-size:0.85rem;
        border-radius:5px;
        ${isActive ? 'background-color:#d40000; color:white; font-weight:bold;' : ''}
      ">${p}</button>`;
    }

    if (page < totalPages) {
      html += `<button onclick="showQuizResult(${page + 1})" style="margin:2px; padding:4px 8px; font-size:0.85rem;">Next</button>`;

    }
    html += `</div>`;
  }

  html += `<button onclick="startQuiz()">Ulangi</button> `;
  html += `<button onclick="document.getElementById('quizModeToggle').click()">Keluar</button>`;

  document.getElementById("quizContainer").innerHTML = html;
}
