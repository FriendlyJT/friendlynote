	let multiSelectMode = false;
    let categories = Object.keys(vocabulary).filter(c => c !== "All");
    categories.unshift("All");

    let selectedCategories = ["All"];
    let timer;
    let interval = "6.5";

    let currentMeaning = "";
    let reverse = false;

	function handleMultiSelectToggle() {
  multiSelectMode = document.getElementById("multiSelectToggle").checked;

  if (!multiSelectMode && selectedCategories.length > 1) {
    selectedCategories = [selectedCategories[0] || "All"];
    usedWords = [];

    if (quizMode) {
      startQuiz();
    } else if (essayMode) {
      startEssay();
    } else {
      randomWord();
      if (tableShown) showAllWords();
    }
  }

  updateActiveCategory();
}

let essayMode = false;
let essayQuestions = [];
let essayAnswers = [];
let currentEssayIndex = 0;
let currentEssayResultPage = 1;

function updateHideButtons() {
  const hideButtons = ['toggleJP', 'toggleID', 'shuffleTableBtn'];
  hideButtons.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.style.display = (quizMode || essayMode) ? 'none' : 'inline-block';
    }
  });
}

function handleEssayModeToggle() {
  essayMode = document.getElementById("essayModeToggle").checked;

  if (essayMode && quizMode) {
    quizMode = false;
    document.getElementById("quizModeToggle").checked = false;
    document.getElementById("quizLengthOptions").style.display = "none";
  }

  const mainElements = [
    "word", "meaning", "randomBtn", "intervalInput", "applyBtn",
    "toggleLangBtn", "togglePickBtn", "toggleShowBtn",
    "toggleAutoShowBtn", "searchInput", "tableContainer", "autoTimeToggle"
  ];
  mainElements.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = essayMode ? "none" : "";
  });

  const secondsLabel = document.querySelector(".controls span");
  if (secondsLabel) secondsLabel.style.display = essayMode ? "none" : "inline";

  document.getElementById("menu").style.display = "flex";
  document.getElementById("essayLengthOptions").style.display = essayMode ? "block" : "none";
  document.getElementById("quizLengthOptions").style.display = quizMode ? "block" : "none";

 updateHideButtons();
 clearCanvas();
 
  if (essayMode) {
    startEssay();
  } else {
    document.getElementById("quizContainer").style.display = "none";
    createMenu();
    updateActiveCategory();
    usedWords = [];
    randomWord();
    if (tableShown) showAllWords();
  }
}


function startEssay() {
  const selectedWords = shuffleArray(
    selectedCategories.includes("All")
      ? Object.values(essayVocabulary).flat()
      : selectedCategories.flatMap(cat => essayVocabulary[cat] || [])
  );

  const essayLengthInput = document.querySelector('input[name="essayLength"]:checked');
  const totalQuestions = essayLengthInput ? parseInt(essayLengthInput.value) : 20;

  essayQuestions = selectedWords.slice(0, totalQuestions);
  essayAnswers = [];
  currentEssayIndex = 0;

  document.getElementById("quizContainer").style.display = "block";
  document.getElementById("essayLengthOptions").style.display = "block";

  showEssayQuestion();
}

document.querySelectorAll('input[name="essayLength"]').forEach(radio => {
  radio.addEventListener('change', () => {
    if (essayMode) startEssay();
  });
});

function showEssayQuestion() {
  const container = document.getElementById("quizContainer");
  if (currentEssayIndex >= essayQuestions.length) return showEssayResult();

  const q = essayQuestions[currentEssayIndex];
  const questionText = `Apa bahasa Jepangnya "<strong>${q.meaning}</strong>"? `;

  let html = `<div style="margin-bottom:10px; font-weight:bold; color:#0b38a4">Soal ${currentEssayIndex + 1} dari ${essayQuestions.length}</div>`;
  html += `<div style="margin-bottom:10px; width:100%; box-sizing:border-box;">${questionText}</div>`;
  html += `<input type="text" id="essayAnswerInput" style="width:100%; padding:8px; font-size:1rem; margin-bottom:10px; box-sizing:border-box; border:1px solid #ccc; border-radius:5px;" />`;
  html += `<div id="essayWarning" style="color:red; margin-top:10px;"></div>`;
  html += `<button id="essayAnswerBtn" onclick="submitEssayAnswer()">Answer</button>`;
  container.innerHTML = html;

  const input = document.getElementById("essayAnswerInput");
  input.focus();

  ["keydown", "keyup"].forEach(eventType => {
    input.addEventListener(eventType, function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        document.getElementById("essayAnswerBtn").click();
      }
    });
  });
}

function submitEssayAnswer() {
  const input = document.getElementById("essayAnswerInput");
  let answer = input.value.trim();

  answer = answer.replace(/[,\.;\/\s、\(\)\[\]]/g, '');

  if (!answer) {
    const warningDiv = document.getElementById("essayWarning");
    if (warningDiv) warningDiv.textContent = "Answer cannot be blank!";
    return;
  } else {
    const warningDiv = document.getElementById("essayWarning");
    if (warningDiv) warningDiv.textContent = "";
  }

  const q = essayQuestions[currentEssayIndex];
const possibleAnswers = [q.kanji, q.romaji, q.masu, q.tekei, q.naikei].filter(Boolean);
const uniqueAnswers = possibleAnswers.filter((v, i, arr) => arr.indexOf(v) === i);

essayAnswers.push({
  question: q.meaning,
  correct: uniqueAnswers.join(" / "),
  answer,
  isCorrect: possibleAnswers.includes(answer)
});

  currentEssayIndex++;
  showEssayQuestion();
}

function showEssayResult(page = 1) {
  currentEssayResultPage = page;
  const start = (page - 1) * resultsPerPage;
  const end = start + resultsPerPage;
  const visibleAnswers = essayAnswers.slice(start, end);

  let score = essayAnswers.filter(q => q.isCorrect).length;

  let html = `<h3>Essay Results :</h3><ol start="${start + 1}">`;
  visibleAnswers.forEach((q, i) => {
    html += `<li style="margin-bottom:8px;">${q.question}<br />
      Jawaban kamu: <strong>${q.answer}</strong> ${q.isCorrect ? "✅" : "❌"}<br />
      Jawaban benar: <strong>${q.correct}</strong>
    </li>`;
  });
  html += `</ol><h4>Jawaban Benar: ${score} dari ${essayAnswers.length}</h4>`;
  const nilai = Math.round((score / essayAnswers.length) * 100);
  let warna = nilai >= 80 ? "green" : nilai >= 60 ? "orange" : "red";
  html += `<div><strong>Nilai:</strong> <span style="color:${warna}"> ${nilai}</span></div>`;

  const totalPages = Math.ceil(essayAnswers.length / resultsPerPage);
  if (totalPages > 1) {
    html += `<div style="margin:10px 0;">`;
    if (page > 1) {
      html += `<button onclick="showEssayResult(${page - 1})" style="margin:2px; padding:4px 8px; font-size:0.85rem;">Prev</button> `;
    }

    for (let p = 1; p <= totalPages; p++) {
      const isActive = p === page;
      html += `<button onclick="showEssayResult(${p})" style="
        margin:2px;
        padding:4px 8px;
        font-size:0.85rem;
        border-radius:5px;
        ${isActive ? 'background-color:#d40000; color:white; font-weight:bold;' : ''}
      ">${p}</button>`;
    }

    if (page < totalPages) {
      html += `<button onclick="showEssayResult(${page + 1})" style="margin:2px; padding:4px 8px; font-size:0.85rem;">Next</button>`;
    }
    html += `</div>`;
  }

  html += `<button onclick="startEssay()">Try again</button> `;
  html += `<button onclick="document.getElementById('essayModeToggle').click()">Exit</button>`;

  document.getElementById("quizContainer").innerHTML = html;
}

let quizMode = false;
let quizQuestions = [];
let quizAnswers = [];
let currentQuizIndex = 0;
let currentResultPage = 1;
const resultsPerPage = 10;

let hideIDText = false;

function showID(key, text) {

function shuffleTable() {
  const table = document.getElementById("dataTable");
  if (!table) return;

  const tbody = table.querySelector("tbody");
  const rows = Array.from(tbody.querySelectorAll("tr"));
  const shuffled = shuffleArray(rows);

  tbody.innerHTML = "";
  shuffled.forEach((row, index) => {
    row.querySelector("td").innerText = index + 1;
    tbody.appendChild(row);
  });
}

function toggleColumnText(type) {
  if (type === 'jp') {
    hideJPText = !hideJPText;

    if (hideJPText) hideIDText = false;

    showIndividualJP.clear();
    showIndividualID.clear(); 

    document.getElementById('toggleJP').innerText = hideJPText ? "Unhide JP" : "Hide JP";
    document.getElementById('toggleID').innerText = "Hide ID";
  } else if (type === 'id') {
    hideIDText = !hideIDText;

    if (hideIDText) hideJPText = false;

    showIndividualID.clear();
    showIndividualJP.clear();

    document.getElementById('toggleID').innerText = hideIDText ? "Unhide ID" : "Hide ID";
    document.getElementById('toggleJP').innerText = "Hide JP";
  }

  showAllWords(false);
}


function showOneJP(key) {
  showIndividualJP.add(key);
  showAllWords();
}

function showOneID(key) {

}

showDrawingPadToggleButton();

let savedDrawing = null;

function toggleDrawingPad() {
  const drawDiv = document.getElementById("drawingContainer");
  const toggleBtn = document.getElementById("toggleDrawBtn");
  const canvas = document.getElementById("drawingCanvas");
  const ctx = canvas.getContext("2d");

  if (drawDiv.style.display === "none") {
    drawDiv.style.display = "block";
    toggleBtn.innerText = "Hide";

    if (savedDrawing) {
      const img = new Image();
      img.onload = function () {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
      };
      img.src = savedDrawing;
    }

    initDrawingCanvas(); 
  } else {
    savedDrawing = canvas.toDataURL();
    drawDiv.style.display = "none";
    toggleBtn.innerText = "✏️ Draw";
  }
}

(function enableResizableDrawingPad() {
  const handle = document.getElementById("resizeHandle");
  const container = document.getElementById("drawingContainer");
  const canvas = document.getElementById("drawingCanvas");

  let isResizing = false;
  let startY = 0;
  let startHeight = 0;

  function startResize(y) {
    isResizing = true;
    startY = y;
    startHeight = container.offsetHeight;
  }

function doResize(y) {
  if (!isResizing) return;

  const delta = startY - y;
  const newHeight = startHeight + delta;

  if (newHeight > 100 && newHeight < window.innerHeight * 0.9) {
    const canvas = document.getElementById("drawingCanvas");
    const ctx = canvas.getContext("2d");

    const backupCanvas = document.createElement("canvas");
    backupCanvas.width = canvas.width;
    backupCanvas.height = canvas.height;
    const backupCtx = backupCanvas.getContext("2d");
    backupCtx.drawImage(canvas, 0, 0);

    container.style.height = newHeight + "px";
    canvas.height = newHeight;
    canvas.width = backupCanvas.width;

    const ctxNew = canvas.getContext("2d");
    ctxNew.drawImage(backupCanvas, 0, 0);
  }
}

  function stopResize() {
    isResizing = false;
  }

  handle.addEventListener("mousedown", (e) => {
    startResize(e.clientY);
  });
  window.addEventListener("mousemove", (e) => doResize(e.clientY));
  window.addEventListener("mouseup", stopResize);

  handle.addEventListener("touchstart", (e) => {
    startResize(e.touches[0].clientY);
  });
  window.addEventListener("touchmove", (e) => {
    doResize(e.touches[0].clientY);
  });
  window.addEventListener("touchend", stopResize);
})();


function initDrawingCanvas() {
  const canvas = document.getElementById("drawingCanvas");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  let isDrawing = false;

  function getTouchPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    return {
      x: t.clientX - rect.left,
      y: t.clientY - rect.top
    };
  }

  canvas.addEventListener("touchstart", function (e) {
    e.preventDefault();
    const pos = getTouchPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    isDrawing = true;
  });

  canvas.addEventListener("touchmove", function (e) {
    if (!isDrawing) return;
    const pos = getTouchPos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  });

  canvas.addEventListener("touchend", function () {
    isDrawing = false;
  });
}



function clearCanvas() {
  const canvas = document.getElementById("drawingCanvas");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function handleQuizModeToggle() {
  quizMode = document.getElementById("quizModeToggle").checked;

  if (quizMode && essayMode) {
    essayMode = false;
    document.getElementById("essayModeToggle").checked = false;
    document.getElementById("essayLengthOptions").style.display = "none";
  }

  const mainElements = [
    "word", "meaning", "randomBtn", "intervalInput", "applyBtn",
    "toggleLangBtn", "togglePickBtn", "toggleShowBtn",
    "toggleAutoShowBtn", "searchInput", "tableContainer", "autoTimeToggle"
  ];
  mainElements.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = quizMode ? "none" : "";
  });

  document.getElementById("menu").style.display = "flex";
  document.getElementById("quizLengthOptions").style.display = quizMode ? "block" : "none";
 updateHideButtons();
 clearCanvas();
  if (quizMode) {
    startQuiz();

    document.getElementById("quizContainer").style.display = "none";

function startQuiz() {
  const selectedWords = shuffleArray(selectedCategories.flatMap(cat => vocabulary[cat] || []));
  const quizLengthInput = document.querySelector('input[name="quizLength"]:checked');
  const totalQuestions = quizLengthInput ? parseInt(quizLengthInput.value) : 20;

  const half = Math.floor(totalQuestions / 2);
  const questionsIDtoJP = selectedWords.slice(0, half).map(q => ({ ...q, reverse: true })); 
  const questionsJPtoID = selectedWords.slice(half, half * 2).map(q => ({ ...q, reverse: false }));

  quizQuestions = shuffleArray([...questionsIDtoJP, ...questionsJPtoID]);
  quizAnswers = [];
  currentQuizIndex = 0;

  document.getElementById("quizContainer").style.display = "block";
  showQuizQuestion();
}

function showQuizQuestion() {
  const container = document.getElementById("quizContainer");
  if (currentQuizIndex >= quizQuestions.length) return showQuizResult();

  const q = quizQuestions[currentQuizIndex];
  const correct = q.reverse ? q.word : q.meaning;
  const questionText = `Apa kosakata dari "<strong>${q.reverse ? q.meaning : q.word}</strong>" dalam bahasa ${q.reverse ? "Jepang" : "Indonesia"}?`;

  const sameCategoryWords = selectedCategories.flatMap(cat => vocabulary[cat] || []);
const correctAnswer = q.reverse ? q.word : q.meaning;

const allOptions = new Set();
allOptions.add(correctAnswer);

for (let item of shuffleArray(sameCategoryWords)) {
  const opt = q.reverse ? item.word : item.meaning;
  if (!allOptions.has(opt)) {
    allOptions.add(opt);
    if (allOptions.size >= 4) break;
  }
}

const options = shuffleArray([...allOptions]);

  let html = `<div style="margin-bottom:10px; font-weight:bold; color:#0b38a4">Soal ${currentQuizIndex + 1} dari ${quizQuestions.length}</div>`;
  html += `<div style="margin-bottom:10px;">${questionText}</div>`;
  options.forEach((opt, idx) => {
    html += `<label class="quiz-option"><input type="radio" name="quizOption" value="${opt}"/> ${String.fromCharCode(65 + idx)}. ${opt}</label>`;
  });
  html += `<div id="quizWarning" style="color:red; margin-top:10px;"></div>`;
  html += `<button onclick="submitQuizAnswer()">Answer</button>`;
  container.innerHTML = html;
}

function submitQuizAnswer() {
  const selected = document.querySelector("input[name='quizOption']:checked");
  if (!selected) {
  const warningDiv = document.getElementById("quizWarning");
  if (warningDiv) warningDiv.textContent = "Answers cannot be blank!";
  return;
} else {
  const warningDiv = document.getElementById("quizWarning");
  if (warningDiv) warningDiv.textContent = "";
}
  const answer = selected.value;
  const q = quizQuestions[currentQuizIndex];
  const correct = q.reverse ? q.word : q.meaning;
  quizAnswers.push({
    question: q.reverse ? q.meaning : q.word,
    correct,
    answer
  });
  currentQuizIndex++;
  showQuizQuestion();
}

function showQuizResult(page = 1) {
  currentResultPage = page;
  const start = (page - 1) * resultsPerPage;
  const end = start + resultsPerPage;
  const visibleAnswers = quizAnswers.slice(start, end);

  let score = quizAnswers.filter(q => q.answer === q.correct).length;

  let html = `<h3>Quiz Results :</h3><ol start="${start + 1}">`;
  visibleAnswers.forEach((q, i) => {
    const isCorrect = q.answer === q.correct;
    html += `<li style="margin-bottom:8px;">${q.question}<br />
      Jawaban kamu: <strong>${q.answer}</strong> ${isCorrect ? "✅" : "❌"}<br />
      Jawaban benar: <strong>${q.correct}</strong>
    </li>`;
  });
  html += `</ol><h4>Jawaban Benar: ${score} dari ${quizAnswers.length}</h4>`;
const nilai = Math.round((score / quizAnswers.length) * 100);
let warna = nilai >= 80 ? "green" : nilai >= 60 ? "orange" : "red";
html += `<div><strong>Nilai:</strong> <span style="color:${warna}"> ${nilai}</span></div>`;

  const totalPages = Math.ceil(quizAnswers.length / resultsPerPage);
  if (totalPages > 1) {
    html += `<div style="margin:10px 0;">`;
    if (page > 1) {
      html += `<button onclick="showQuizResult(${page - 1})" style="margin:2px; padding:4px 8px; font-size:0.85rem;">Prev</button> `;

    }

     for (let p = 1; p <= totalPages; p++) {
      const isActive = p === page;
      html += `<button onclick="showQuizResult(${p})" style="
        margin:2px;
        padding:4px 8px;
        font-size:0.85rem;
        border-radius:5px;
        ${isActive ? 'background-color:#d40000; color:white; font-weight:bold;' : ''}
      ">${p}</button>`;
    }

    if (page < totalPages) {
      html += `<button onclick="showQuizResult(${page + 1})" style="margin:2px; padding:4px 8px; font-size:0.85rem;">Next</button>`;

    }
    html += `</div>`;
  }

  html += `<button onclick="startQuiz()">Try again</button> `;
  html += `<button onclick="document.getElementById('quizModeToggle').click()">Exit</button>`;

  document.getElementById("quizContainer").innerHTML = html;
}

document.querySelectorAll('input[name="quizLength"]').forEach(radio => {
  radio.addEventListener('change', () => {
    if (quizMode) startQuiz();

});

function shuffleArray(arr) {
  return arr.map(v => [Math.random(), v]).sort().map(v => v[1]);
}

    function createMenu() {
      const menuDiv = document.getElementById("menu");
      menuDiv.innerHTML = "";

      const start = menuPage * menuPerPage;
      const end = start + menuPerPage;
      const visibleCategories = categories.slice(start, end);

      if (menuPage > 0) {
        const prevBtn = document.createElement("button");
        prevBtn.innerHTML = "&larr;";
        prevBtn.classList.add("category-btn", "nav-arrow");

          menuPage--;

        };
        menuDiv.appendChild(prevBtn);
      }

      visibleCategories.forEach(cat => {
        const btn = document.createElement("button");
        btn.innerText = cat;
        btn.classList.add("category-btn");
        if (selectedCategories.includes(cat)) btn.classList.add("active");
        btn.onclick = () => {
  if (!multiSelectMode) {
    selectedCategories = [cat];
  } else {
    if (cat === "All") {
      selectedCategories = ["All"];
    } else {
      if (selectedCategories.includes("All")) selectedCategories = [];
      if (selectedCategories.includes(cat)) {
        selectedCategories = selectedCategories.filter(c => c !== cat);
      } else {
        selectedCategories.push(cat);
      }
      if (selectedCategories.length === 0) selectedCategories = ["All"];
    }
  }

  updateActiveCategory();
  usedWords = [];

  if (quizMode) {
    startQuiz();
} else if (essayMode) {
    startEssay();
} else {
    randomWord();
    if (tableShown) showAllWords();
}
};
        menuDiv.appendChild(btn);
      });

      if (end < categories.length) {
        const nextBtn = document.createElement("button");
        nextBtn.innerHTML = "&rarr;";
        nextBtn.classList.add("category-btn", "nav-arrow");
        nextBtn.onclick = () => {
          menuPage++;
          createMenu();
        };
        menuDiv.appendChild(nextBtn);
      }
    }

    function updateActiveCategory() {
      document.querySelectorAll(".category-btn").forEach(btn => {
        btn.classList.remove("active");
        if (selectedCategories.includes(btn.innerText)) {
          btn.classList.add("active");
        }
      });
    }
	
	let meaningTimeout; 

    function randomWord() {
  clearTimeout(timer);          
  clearTimeout(meaningTimeout); 

  let words = selectedCategories.flatMap(cat => vocabulary[cat] || []);
  words = words.filter(entry => !usedWords.includes(entry.word));

  if (pickUpMode && words.length === 0) {
    const wordDiv = document.getElementById("word");
    const meaningDiv = document.getElementById("meaning");
    let countdown = 3;

    document.getElementById("randomBtn").disabled = true;
    document.getElementById("toggleAutoShowBtn").disabled = true;
    document.getElementById("toggleLangBtn").disabled = true;
    document.getElementById("meaning").style.visibility = "hidden";

    wordDiv.innerText = `Semua sudah tampil... (${countdown})`;
    meaningDiv.innerText = "";

    const countdownInterval = setInterval(() => {
      countdown--;
      if (countdown > 0) {
        wordDiv.innerText = `Semua sudah tampil... (${countdown})`;
      } else {
        clearInterval(countdownInterval);
        usedWords = [];
        randomWord(); 
        setIntervalTime(); 
        document.getElementById("randomBtn").disabled = false;
        document.getElementById("toggleAutoShowBtn").disabled = false;
        document.getElementById("toggleLangBtn").disabled = false;
        document.getElementById("meaning").style.visibility = "visible";
      }
    }, 1000);
    return;
  }

  const entry = words[Math.floor(Math.random() * words.length)];
  if (entry) {
    currentWord = reverse ? entry.meaning : entry.word;
    currentMeaning = reverse ? entry.word : entry.meaning;

    document.getElementById("word").innerHTML = currentWord;
    document.getElementById("meaning").innerHTML = "";

    const meaningDelay = Number(interval) / 2;

    if (autoShowMeaning) {
     meaningTimeout = setTimeout(() => {
  document.getElementById("meaning").innerHTML = currentMeaning || "Tidak diketahui";
}, meaningDelay);
    }

    if (pickUpMode) usedWords.push(entry.word);
  }

  if (autoTimeEnabled) {
    timer = setTimeout(() => {
      randomWord();
    }, interval); 
  }
}

  function showMeaning() {
  document.getElementById("meaning").innerHTML = currentMeaning || "Tidak diketahui";
}

    function setIntervalTime() {
  clearTimeout(timer);
  const inputVal = parseFloat(document.getElementById("intervalInput").value);

  if (isNaN(inputVal) || inputVal < 0.5) {
    alert("Minimum 0.5 seconds!");
    document.getElementById("intervalInput").value = 0.5;
    interval = 500;
  } else {
    interval = inputVal * 1000;
  }

  if (autoTimeEnabled) {
    timer = setTimeout(() => {
      randomWord();
    }, interval);
  }
}

function toggleAutoTime() {
  autoTimeEnabled = document.getElementById("autoTimeToggle").checked;

  if (autoTimeEnabled) {
    setIntervalTime(); 
  } else {
    clearInterval(timer);
  }
}

    function toggleLanguageMode() {
      reverse = !reverse;
      document.getElementById("toggleLangBtn").innerText = `Reverse: ${reverse ? "ON" : "OFF"}`;
      randomWord();
      if (tableShown) showAllWords();
    }

    function togglePickUp() {
      pickUpMode = !pickUpMode;
      usedWords = [];
      document.getElementById("togglePickBtn").innerText = `Looping: ${pickUpMode ? "OFF" : "ON"}`;
      randomWord();
    }

    function toggleAutoShow() {
      autoShowMeaning = !autoShowMeaning;
      document.getElementById("toggleAutoShowBtn").innerText = `Spoiler: ${autoShowMeaning ? "ON" : "OFF"}`;
      randomWord();
    }

    let sortBy = null;
let sortAsc = true;


function showJP(key, text) {
  showIndividualJP.add(key);
  const span = document.getElementById(key);
  if (span) {
    span.innerHTML = `
      <span id="${key}_text">${text}</span>
      <button onclick="hideJP('${key}', \`${text.replace(/`/g, '\\`')}\`)">Hide</button>
    `;

}

function hideJP(key, text) {
  showIndividualJP.delete(key);
  const span = document.getElementById(key);
  if (span) {
    span.innerHTML = `
      <button onclick="showJP('${key}', \`${text.replace(/`/g, '\\`')}\`)">Show</button>
    `;

}

function showID(key, text) {

    span.innerHTML = `
      <span id="${key}_text">${text}</span>
      <button onclick="hideID('${key}', \`${text.replace(/`/g, '\\`')}\`)">Hide</button>
    `;
  }
}

function hideID(key, text) {
  showIndividualID.delete(key);
  const span = document.getElementById(key);
  if (span) {
    span.innerHTML = `
      <button onclick="showID('${key}', \`${text.replace(/`/g, '\\`')}\`)">Show</button>
    `;
  }
}

let filteredList = [];
let originalFilteredList = [];

function showAllWords(forceNewFilter = true) {
  const input = document.getElementById("searchInput").value.toLowerCase();
  const list = selectedCategories.flatMap(cat => vocabulary[cat] || []);

 if (forceNewFilter) {
  filteredList = list.filter(entry => {
    const text = (entry.word + " " + entry.meaning).toLowerCase();
    return text.includes(input);
  });
  originalFilteredList = [...filteredList];
  currentTablePage = 1;
}

  window.renderTable(currentTablePage);
}

function sortEntries() {
  if (!sortBy) return;
  filteredList.sort((a, b) => {
    const aVal = sortBy === "jp" ? (reverse ? a.meaning : a.word) : (reverse ? a.word : a.meaning);
    const bVal = sortBy === "jp" ? (reverse ? b.meaning : b.word) : (reverse ? b.word : b.meaning);
    return sortAsc ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
  });
}

function renderTable(page = 1) {
  const container = document.getElementById("tableContainer");
  const chunkSize = 20;
  const totalPages = Math.ceil(filteredList.length / chunkSize);
  currentTablePage = page;

  sortEntries();
  const start = (page - 1) * chunkSize;
  const chunk = filteredList.slice(start, start + chunkSize);
  
  if (filteredList.length === 0) {
    container.innerHTML = `<p style="margin-top:10px;">No results found.</p>`;
    return;
  }

  let html = `<table id="dataTable"><thead><tr><th>No</th>`;

  const jpArrow = sortBy === "jp" ? (sortAsc ? "↑" : "↓") : "↕";
  const idArrow = sortBy === "id" ? (sortAsc ? "↑" : "↓") : "↕";

  html += `<th onclick="toggleSort('jp')" style="cursor:pointer;">${reverse ? "Indonesia" : "Jepang"} ${jpArrow}</th>`;
  html += `<th onclick="toggleSort('id')" style="cursor:pointer;">${reverse ? "Jepang" : "Indonesia"} ${idArrow}</th>`;
  html += `</tr></thead><tbody>`;

  chunk.forEach((entry, index) => {
    html += `<tr><td>${start + index + 1}</td>`;

    const jpText = reverse ? entry.meaning : entry.word;
    const idText = reverse ? entry.word : entry.meaning;

    const uniqueKey = `${entry.word}_${entry.meaning}_${start + index}`;
    const jpKey = uniqueKey + "_jp";
    const idKey = uniqueKey + "_id";

    if (hideJPText) {
      if (showIndividualJP.has(jpKey)) {
        html += `<td><span id="${jpKey}">${jpText} <button onclick="hideJP('${jpKey}', \`${jpText.replace(/`/g, '\\`')}\`)">Hide</button></span></td>`;
      } else {
        html += `<td><span id="${jpKey}"><button onclick="showJP('${jpKey}', \`${jpText.replace(/`/g, '\\`')}\`)">Show</button></span></td>`;
      }
    } else {
      html += `<td>${jpText}</td>`;
    }

    if (hideIDText) {
      if (showIndividualID.has(idKey)) {
        html += `<td><span id="${idKey}">${idText} <button onclick="hideID('${idKey}', \`${idText.replace(/`/g, '\\`')}\`)">Hide</button></span></td>`;
      } else {
        html += `<td><span id="${idKey}"><button onclick="showID('${idKey}', \`${idText.replace(/`/g, '\\`')}\`)">Show</button></span></td>`;
      }
    } else {
      html += `<td>${idText}</td>`;
    }

    html += `</tr>`;
  });

  html += `</tbody></table>`;

  const input = document.getElementById("searchInput").value.toLowerCase();
  if (!input) {
    html += `<div style="margin-top: 10px;">`;
    for (let i = 1; i <= totalPages; i++) {
      html += `<button onclick="renderTable(${i})" style="margin: 2px; padding: 6px 10px; border-radius: 4px; ${i === page ? 'background:#0b38a4;color:white;' : ''}">${i}</button>`;
    }
    html += `</div>`;
  }

  container.innerHTML = html;
}

window.renderTable = renderTable;

function toggleSort(column) {
  if (sortBy === column) {
    if (sortAsc === false) {
      sortBy = null;
      filteredList = [...originalFilteredList];
      currentTablePage = 1;
      showAllWords(false);
      return;
    }
    sortAsc = !sortAsc;
  } else {
    sortBy = column;
    sortAsc = true;
  }

  currentTablePage = 1;
  showAllWords(false);
}

function toggleShowTable() {
  tableShown = !tableShown;
  document.getElementById("toggleShowBtn").innerText = `Table: ${tableShown ? "ON" : "OFF"}`;
  const searchInput = document.getElementById("searchInput");
  const hideControls = document.getElementById("hideControls");

  if (tableShown) {
    showAllWords();
    searchInput.style.display = "block";
    if (hideControls) hideControls.style.display = "block"; 
  } else {
    document.getElementById("tableContainer").innerHTML = "";
    searchInput.style.display = "none";
    searchInput.value = "";
    if (hideControls) hideControls.style.display = "none"; 
  }
}
