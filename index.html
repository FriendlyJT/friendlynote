  <script>

	let multiSelectMode = false;
    let categories = Object.keys(vocabulary).filter(c => c !== "All");
    categories.unshift("All");

    let selectedCategories = ["All"];
    let timer;
    let interval = "6.5";
    let currentWord = "";
    let currentMeaning = "";
    let reverse = false;
    let pickUpMode = true;
    let usedWords = [];
    let tableShown = false;
    let autoShowMeaning = true;
    let menuPage = 0;
    const menuPerPage = 12;
	let autoTimeEnabled = true;
	
	function handleMultiSelectToggle() {
  multiSelectMode = document.getElementById("multiSelectToggle").checked;
  if (!multiSelectMode && selectedCategories.length > 1) {
    selectedCategories = [selectedCategories[0] || "All"];
    usedWords = [];
    randomWord();
    if (tableShown) showAllWords();
  }
  updateActiveCategory();
}

let quizMode = false;
let quizQuestions = [];
let quizAnswers = [];
let currentQuizIndex = 0;
let currentResultPage = 1;
const resultsPerPage = 10;

let hideJPText = false;
let hideIDText = false;
let showIndividualJP = new Set();
let showIndividualID = new Set();
let currentTablePage = 1;

function showJP(key, text) {
  showIndividualJP.add(key);
  const span = document.getElementById(key);
  if (span) span.innerHTML = text;
}

function showID(key, text) {
  showIndividualID.add(key);
  const span = document.getElementById(key);
  if (span) span.innerHTML = text;
}

function shuffleTable() {
  const table = document.getElementById("dataTable");
  if (!table) return;

  const tbody = table.querySelector("tbody");
  const rows = Array.from(tbody.querySelectorAll("tr"));
  const shuffled = shuffleArray(rows);

  tbody.innerHTML = "";
  shuffled.forEach((row, index) => {
    row.querySelector("td").innerText = index + 1;
    tbody.appendChild(row);
  });
}

function toggleColumnText(type) {
  if (type === 'jp') {
    hideJPText = !hideJPText;
    showIndividualJP.clear(); 
    document.getElementById('toggleJP').innerText = `${hideJPText ? "Unhide JP" : "Hide JP"}`;
  } else if (type === 'id') {
    hideIDText = !hideIDText;
    showIndividualID.clear(); 
    document.getElementById('toggleID').innerText = `${hideIDText ? "Unhide ID" : "Hide ID"}`;
  }

  showAllWords();
}

function showOneJP(key) {
  showIndividualJP.add(key);
  showAllWords();
}

function showOneID(key) {
  showIndividualID.add(key);
  showAllWords();
}

function isMobileDevice() {
  return window.innerWidth <= 768;
}

function showDrawingPadToggleButton() {
  const toggleBtn = document.getElementById("toggleDrawBtn");
  if (isMobileDevice()) {
    toggleBtn.style.display = "block";
  } else {
    toggleBtn.style.display = "none";
    document.getElementById("drawingContainer").style.display = "none";
  }
}

showDrawingPadToggleButton();

function toggleDrawingPad() {
  const drawDiv = document.getElementById("drawingContainer");
  const toggleBtn = document.getElementById("toggleDrawBtn");

  if (drawDiv.style.display === "none") {
    drawDiv.style.display = "block";
    toggleBtn.innerText = "Hide";
    initDrawingCanvas();
  } else {
    drawDiv.style.display = "none";
    toggleBtn.innerText = "✏️ Draw";
  }
}


function initDrawingCanvas() {
  const canvas = document.getElementById("drawingCanvas");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  let isDrawing = false;

  function getTouchPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    return {
      x: t.clientX - rect.left,
      y: t.clientY - rect.top
    };
  }

  canvas.addEventListener("touchstart", function (e) {
    e.preventDefault();
    const pos = getTouchPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    isDrawing = true;
  });

  canvas.addEventListener("touchmove", function (e) {
    if (!isDrawing) return;
    const pos = getTouchPos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  });

  canvas.addEventListener("touchend", function () {
    isDrawing = false;
  });
}


function clearCanvas() {
  const canvas = document.getElementById("drawingCanvas");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function handleQuizModeToggle() {
  quizMode = document.getElementById("quizModeToggle").checked;
  const mainElements = [
    "word", "meaning", "randomBtn", "intervalInput", "applyBtn",
    "toggleLangBtn", "togglePickBtn", "toggleShowBtn",
    "toggleAutoShowBtn", "searchInput", "tableContainer", "autoTimeToggle"
  ];

  mainElements.forEach(id => document.getElementById(id).style.display = quizMode ? "none" : "");
  document.getElementById("menu").style.display = "flex";
  document.getElementById("quizLengthOptions").style.display = quizMode ? "block" : "none";

  const timeLabel = document.querySelector(".controls span");
  if (timeLabel) timeLabel.style.display = quizMode ? "none" : "inline";
  
  const hideControls = document.getElementById("hideControls");
  if (hideControls) hideControls.style.display = quizMode ? "none" : (tableShown ? "block" : "none");


    if (quizMode) {
  startQuiz();
} else {
  document.getElementById("quizContainer").style.display = "none";
  document.getElementById("searchInput").style.display = tableShown ? "block" : "none"; 
}
}

function startQuiz() {
  const selectedWords = shuffleArray(selectedCategories.flatMap(cat => vocabulary[cat] || []));
  const quizLengthInput = document.querySelector('input[name="quizLength"]:checked');
  const totalQuestions = quizLengthInput ? parseInt(quizLengthInput.value) : 20;

  const half = Math.floor(totalQuestions / 2);
  const questionsIDtoJP = selectedWords.slice(0, half).map(q => ({ ...q, reverse: true })); 
  const questionsJPtoID = selectedWords.slice(half, half * 2).map(q => ({ ...q, reverse: false }));

  quizQuestions = shuffleArray([...questionsIDtoJP, ...questionsJPtoID]);
  quizAnswers = [];
  currentQuizIndex = 0;

  document.getElementById("quizContainer").style.display = "block";
  showQuizQuestion();
}

function showQuizQuestion() {
  const container = document.getElementById("quizContainer");
  if (currentQuizIndex >= quizQuestions.length) return showQuizResult();

  const q = quizQuestions[currentQuizIndex];
  const correct = q.reverse ? q.word : q.meaning;
  const questionText = `Apa kosakata dari "<strong>${q.reverse ? q.meaning : q.word}</strong>" dalam bahasa ${q.reverse ? "Jepang" : "Indonesia"}?`;

  const sameCategoryWords = selectedCategories.flatMap(cat => vocabulary[cat] || []);
const correctAnswer = q.reverse ? q.word : q.meaning;

const allOptions = new Set();
allOptions.add(correctAnswer);

for (let item of shuffleArray(sameCategoryWords)) {
  const opt = q.reverse ? item.word : item.meaning;
  if (!allOptions.has(opt)) {
    allOptions.add(opt);
    if (allOptions.size >= 4) break;
  }
}

const options = shuffleArray([...allOptions]);

  let html = `<div style="margin-bottom:10px; font-weight:bold; color:#0040ff">Soal ${currentQuizIndex + 1} dari ${quizQuestions.length}</div>`;
  html += `<div style="margin-bottom:10px;">${questionText}</div>`;
  options.forEach((opt, idx) => {
    html += `<label class="quiz-option"><input type="radio" name="quizOption" value="${opt}"/> ${String.fromCharCode(65 + idx)}. ${opt}</label>`;
  });
  html += `<div id="quizWarning" style="color:red; margin-top:10px;"></div>`;
  html += `<button onclick="submitQuizAnswer()">Answer</button>`;
  container.innerHTML = html;
}

function submitQuizAnswer() {
  const selected = document.querySelector("input[name='quizOption']:checked");
  if (!selected) {
  const warningDiv = document.getElementById("quizWarning");
  if (warningDiv) warningDiv.textContent = "Answers cannot be blank!";
  return;
} else {
  const warningDiv = document.getElementById("quizWarning");
  if (warningDiv) warningDiv.textContent = "";
}
  const answer = selected.value;
  const q = quizQuestions[currentQuizIndex];
  const correct = q.reverse ? q.word : q.meaning;
  quizAnswers.push({
    question: q.reverse ? q.meaning : q.word,
    correct,
    answer
  });
  currentQuizIndex++;
  showQuizQuestion();
}

function showQuizResult(page = 1) {
  currentResultPage = page;
  const start = (page - 1) * resultsPerPage;
  const end = start + resultsPerPage;
  const visibleAnswers = quizAnswers.slice(start, end);

  let score = quizAnswers.filter(q => q.answer === q.correct).length;

  let html = `<h3>Quiz Results :</h3><ol start="${start + 1}">`;
  visibleAnswers.forEach((q, i) => {
    const isCorrect = q.answer === q.correct;
    html += `<li style="margin-bottom:8px;">${q.question}<br />
      Jawaban kamu: <strong>${q.answer}</strong> ${isCorrect ? "✅" : "❌"}<br />
      Jawaban benar: <strong>${q.correct}</strong>
    </li>`;
  });
  html += `</ol><h4>Jawaban Benar: ${score} dari ${quizAnswers.length}</h4>`;
const nilai = Math.round((score / quizAnswers.length) * 100);
let warna = nilai >= 80 ? "green" : nilai >= 60 ? "orange" : "red";
html += `<div><strong>Nilai:</strong> <span style="color:${warna}"> ${nilai}</span></div>`;

  const totalPages = Math.ceil(quizAnswers.length / resultsPerPage);
  if (totalPages > 1) {
    html += `<div style="margin:10px 0;">`;
    if (page > 1) {
      html += `<button onclick="showQuizResult(${page - 1})" style="margin:2px; padding:4px 8px; font-size:0.85rem;">Prev</button> `;

    }

     for (let p = 1; p <= totalPages; p++) {
      const isActive = p === page;
      html += `<button onclick="showQuizResult(${p})" style="
        margin:2px;
        padding:4px 8px;
        font-size:0.85rem;
        border-radius:5px;
        ${isActive ? 'background-color:#d40000; color:white; font-weight:bold;' : ''}
      ">${p}</button>`;
    }

    if (page < totalPages) {
      html += `<button onclick="showQuizResult(${page + 1})" style="margin:2px; padding:4px 8px; font-size:0.85rem;">Next</button>`;

    }
    html += `</div>`;
  }

  html += `<button onclick="startQuiz()">Try again</button> `;
  html += `<button onclick="document.getElementById('quizModeToggle').click()">Exit</button>`;

  document.getElementById("quizContainer").innerHTML = html;
}

document.querySelectorAll('input[name="quizLength"]').forEach(radio => {
  radio.addEventListener('change', () => {
    if (quizMode) startQuiz();
  });
});

function shuffleArray(arr) {
  return arr.map(v => [Math.random(), v]).sort().map(v => v[1]);
}

    function createMenu() {
      const menuDiv = document.getElementById("menu");
      menuDiv.innerHTML = "";

      const start = menuPage * menuPerPage;
      const end = start + menuPerPage;
      const visibleCategories = categories.slice(start, end);

      if (menuPage > 0) {
        const prevBtn = document.createElement("button");
        prevBtn.innerHTML = "&larr;";
        prevBtn.classList.add("category-btn", "nav-arrow");
        prevBtn.onclick = () => {
          menuPage--;
          createMenu();
        };
        menuDiv.appendChild(prevBtn);
      }

      visibleCategories.forEach(cat => {
        const btn = document.createElement("button");
        btn.innerText = cat;
        btn.classList.add("category-btn");
        if (selectedCategories.includes(cat)) btn.classList.add("active");
        btn.onclick = () => {
  if (!multiSelectMode) {
    selectedCategories = [cat];
  } else {
    if (cat === "All") {
      selectedCategories = ["All"];
    } else {
      if (selectedCategories.includes("All")) selectedCategories = [];
      if (selectedCategories.includes(cat)) {
        selectedCategories = selectedCategories.filter(c => c !== cat);
      } else {
        selectedCategories.push(cat);
      }
      if (selectedCategories.length === 0) selectedCategories = ["All"];
    }
  }

  updateActiveCategory();
  usedWords = [];

  if (quizMode) {
    startQuiz(); 
  } else {
    randomWord();
    if (tableShown) showAllWords();
  }
};
        menuDiv.appendChild(btn);
      });

      if (end < categories.length) {
        const nextBtn = document.createElement("button");
        nextBtn.innerHTML = "&rarr;";
        nextBtn.classList.add("category-btn", "nav-arrow");
        nextBtn.onclick = () => {
          menuPage++;
          createMenu();
        };
        menuDiv.appendChild(nextBtn);
      }
    }

    function updateActiveCategory() {
      document.querySelectorAll(".category-btn").forEach(btn => {
        btn.classList.remove("active");
        if (selectedCategories.includes(btn.innerText)) {
          btn.classList.add("active");
        }
      });
    }

    function randomWord() {
      let words = selectedCategories.flatMap(cat => vocabulary[cat] || []);
      words = words.filter(entry => !usedWords.includes(entry.word));

      if (pickUpMode && words.length === 0) {
  const wordDiv = document.getElementById("word");
  const meaningDiv = document.getElementById("meaning");
  let countdown = 3;

  clearInterval(timer);

  document.getElementById("randomBtn").disabled = true;
  document.getElementById("toggleAutoShowBtn").disabled = true;
  document.getElementById("toggleLangBtn").disabled = true;
  document.getElementById("meaning").style.visibility = "hidden";
  
  
  

  wordDiv.innerText = `Semua sudah tampil... (${countdown})`;
  meaningDiv.innerText = "";

  const countdownInterval = setInterval(() => {
    countdown--;
    if (countdown > 0) {
     wordDiv.innerText = `Semua sudah tampil... (${countdown})`;
    } else {
      clearInterval(countdownInterval);

      usedWords = [];
      randomWord(); 
      setIntervalTime();

      document.getElementById("randomBtn").disabled = false;
      document.getElementById("toggleAutoShowBtn").disabled = false;
	  document.getElementById("toggleLangBtn").disabled = false;
	  document.getElementById("meaning").style.visibility = "visible";
    }
  }, 1000);

  return;
}

      const entry = words[Math.floor(Math.random() * words.length)];
      if (entry) {
        currentWord = reverse ? entry.meaning : entry.word;
        currentMeaning = reverse ? entry.word : entry.meaning;
        document.getElementById("word").innerHTML = currentWord;
        document.getElementById("meaning").innerHTML = "";
        let meaningDelay = Number(interval) / 2;

        if (autoShowMeaning) {
          setTimeout(() => {
            document.getElementById("meaning").innerText = currentMeaning || "Tidak diketahui";
          }, meaningDelay);
        }

        if (pickUpMode) usedWords.push(entry.word);
      }
    }

    function showMeaning() {
      document.getElementById("meaning").innerText = currentMeaning || "Tidak diketahui";
    }

    function setIntervalTime() {
  clearInterval(timer);
  const inputVal = parseFloat(document.getElementById("intervalInput").value);

  if (isNaN(inputVal) || inputVal < 0.5) {
    alert("Minimum 0.5 seconds!");
    document.getElementById("intervalInput").value = 0.5;
    interval = 500;
  } else {
    interval = inputVal * 1000;
  }

  if (autoTimeEnabled) {
    timer = setInterval(randomWord, interval);
  }
}

function toggleAutoTime() {
  autoTimeEnabled = document.getElementById("autoTimeToggle").checked;

  if (autoTimeEnabled) {
    setIntervalTime(); 
  } else {
    clearInterval(timer);
  }
}

    function toggleLanguageMode() {
      reverse = !reverse;
      document.getElementById("toggleLangBtn").innerText = `Reverse: ${reverse ? "ON" : "OFF"}`;
      randomWord();
      if (tableShown) showAllWords();
    }

    function togglePickUp() {
      pickUpMode = !pickUpMode;
      usedWords = [];
      document.getElementById("togglePickBtn").innerText = `Looping: ${pickUpMode ? "OFF" : "ON"}`;
      randomWord();
    }

    function toggleAutoShow() {
      autoShowMeaning = !autoShowMeaning;
      document.getElementById("toggleAutoShowBtn").innerText = `Spoiler: ${autoShowMeaning ? "ON" : "OFF"}`;
      randomWord();
    }

    let sortBy = null;
let sortAsc = true;


function showJP(key, text) {
  showIndividualJP.add(key);
  const span = document.getElementById(key);
  if (span) {
    span.innerHTML = `
      <span id="${key}_text">${text}</span>
      <button onclick="hideJP('${key}', \`${text.replace(/`/g, '\\`')}\`)">Hide</button>
    `;
  }
}

function hideJP(key, text) {
  showIndividualJP.delete(key);
  const span = document.getElementById(key);
  if (span) {
    span.innerHTML = `
      <button onclick="showJP('${key}', \`${text.replace(/`/g, '\\`')}\`)">Show</button>
    `;
  }
}

function showID(key, text) {
  showIndividualID.add(key);
  const span = document.getElementById(key);
  if (span) {
    span.innerHTML = `
      <span id="${key}_text">${text}</span>
      <button onclick="hideID('${key}', \`${text.replace(/`/g, '\\`')}\`)">Hide</button>
    `;
  }
}

function hideID(key, text) {
  showIndividualID.delete(key);
  const span = document.getElementById(key);
  if (span) {
    span.innerHTML = `
      <button onclick="showID('${key}', \`${text.replace(/`/g, '\\`')}\`)">Show</button>
    `;
  }
}


function showAllWords() {
  const container = document.getElementById("tableContainer");
  const input = document.getElementById("searchInput").value.toLowerCase();
  const list = selectedCategories.flatMap(cat => vocabulary[cat] || []);
  let filteredList = list.filter(entry => {
    const text = (entry.word + " " + entry.meaning).toLowerCase();
    return text.includes(input);
  });

  const chunkSize = 20;
  const totalPages = Math.ceil(filteredList.length / chunkSize);

  function sortEntries() {
    if (!sortBy) return;
    filteredList.sort((a, b) => {
      const aVal = sortBy === "jp" ? (reverse ? a.meaning : a.word) : (reverse ? a.word : a.meaning);
      const bVal = sortBy === "jp" ? (reverse ? b.meaning : b.word) : (reverse ? b.word : b.meaning);
      return sortAsc ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
    });
  }

  function renderTable(page = 1) {
  currentTablePage = page;
    sortEntries();
    const start = (page - 1) * chunkSize;
    const chunk = filteredList.slice(start, start + chunkSize);
    let html = `<table id="dataTable"><thead><tr><th>No</th>`;

const jpArrow = sortBy === "jp" ? (sortAsc ? "↑" : "↓") : "↕";
const idArrow = sortBy === "id" ? (sortAsc ? "↑" : "↓") : "↕";

html += `<th onclick="toggleSort('jp')" style="cursor:pointer;">${reverse ? "Indonesia" : "Jepang"} ${jpArrow}</th>`;
html += `<th onclick="toggleSort('id')" style="cursor:pointer;">${reverse ? "Jepang" : "Indonesia"} ${idArrow}</th>`;

    html += `</tr></thead><tbody>`;

    chunk.forEach((entry, index) => {
      html += `<tr><td>${start + index + 1}</td>`;

      const jpText = reverse ? entry.meaning : entry.word;
      const idText = reverse ? entry.word : entry.meaning;

      const jpKey = entry.meaning + "_jp";
      const idKey = entry.meaning + "_id";

      if (hideJPText) {
  if (showIndividualJP.has(jpKey)) {
    html += `<td><span id="${jpKey}">${jpText} <button onclick="hideJP('${jpKey}')">Hide</button></span></td>`;
  } else {
    html += `<td><span id="${jpKey}"><button onclick="showJP('${jpKey}', \`${jpText.replace(/`/g, '\\`')}\`)">Show</button></span></td>`;
  }
} else {
  html += `<td>${jpText}</td>`;
}

      if (hideIDText) {
  if (showIndividualID.has(idKey)) {
    html += `<td><span id="${idKey}">${idText} <button onclick="hideID('${idKey}')">Hide</button></span></td>`;
  } else {
    html += `<td><span id="${idKey}"><button onclick="showID('${idKey}', \`${idText.replace(/`/g, '\\`')}\`)">Show</button></span></td>`;
  }
} else {
  html += `<td>${idText}</td>`;
}

    });

    html += `</tbody></table>`;

    if (!input) {
      html += `<div style="margin-top: 10px;">`;
      for (let i = 1; i <= totalPages; i++) {
        html += `<button onclick="renderTable(${i})" style="margin: 2px; padding: 6px 10px; border-radius: 4px; ${i === page ? 'background:#0040ff;color:white;' : ''}">${i}</button>`;
      }
      html += `</div>`;
    }

    container.innerHTML = html;
  }

  window.renderTable = renderTable;
  renderTable(currentTablePage);
}

function toggleSort(column) {
  if (sortBy === column) {
    sortAsc = !sortAsc;
  } else {
    sortBy = column;
    sortAsc = true;
  }
  showAllWords();
}

function toggleShowTable() {
  tableShown = !tableShown;
  document.getElementById("toggleShowBtn").innerText = `Table: ${tableShown ? "ON" : "OFF"}`;
  const searchInput = document.getElementById("searchInput");
  const hideControls = document.getElementById("hideControls");

  if (tableShown) {
    showAllWords();
    searchInput.style.display = "block";
    if (hideControls) hideControls.style.display = "block"; 
  } else {
    document.getElementById("tableContainer").innerHTML = "";
    searchInput.style.display = "none";
    searchInput.value = "";
    if (hideControls) hideControls.style.display = "none"; 
  }
}



    function filterTable() {
      showAllWords();
    }

    createMenu();
    randomWord();
    setIntervalTime();
  </script>
</body>
